<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-main">
        <h1>Unit Converter</h1>
        
        <input type="number" id="input" placeholder="Enter value">
        
        <select id="unitType">
            <option value="kgToLbs">Kilograms to Pounds</option>
            <option value="lbsToKg">Pounds to Kilograms</option>
            <option value="cToF">Celsius to Fahrenheit</option>
            <option value="fToC">Fahrenheit to Celsius</option>
            <option value="cmToInch">Centimeters to Inches</option>
            <option value="inchToCm">Inches to Centimeters</option>
        </select>

        <button id="convert">Convert</button>
        <button id="clear">Clear</button>

        <div class="result-area">
            <p id="result"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
